<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
  <!-- Coin/wallet icon -->
  <g transform="translate(4, 4)">
    <!-- Outer circle (coin) -->
    <circle cx="28" cy="28" r="28" fill="#0F6E56"/>
    <!-- Inner ring -->
    <circle cx="28" cy="28" r="22" fill="none" stroke="#5DCAA5" stroke-width="2"/>
    <!-- D letter stylized as coin emboss -->
    <path d="M22 16h6c7.2 0 13 5.4 13 12s-5.8 12-13 12h-6V16z" fill="none" stroke="#E1F5EE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="22" y1="16" x2="22" y2="40" stroke="#E1F5EE" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Small sparkle -->
    <circle cx="44" cy="12" r="3" fill="#5DCAA5" opacity="0.8"/>
    <circle cx="48" cy="8" r="1.5" fill="#9FE1CB" opacity="0.6"/>
  </g>
  <!-- Wordmark -->
  <text x="72" y="42" font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif" font-size="36" font-weight="700" fill="#0F6E56">Duit<tspan fill="#1D9E75">Ku</tspan></text>
</svg>
